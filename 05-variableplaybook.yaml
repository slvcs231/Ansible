- name: play level variables
  hosts: frontend
  connection: local
  vars:
    COURSE: Devops with Ansible
    DURATION: 10hrs
    TRAINER: Reddia Gumitha
  tasks:
  - name: print the course info
  # task level variables
    vars:
      COURSE: Ansible
    ansible.builtin.debug:
      msg: "Course Name is: {{COURSE}}, Duration: {{DURATION}}, Trainer: {{TRAINER}}"